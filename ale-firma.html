<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signature - Alessio Alessandrini</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: medium;
        }
        
        table {
            border-collapse: collapse;
            vertical-align: -webkit-baseline-middle;
        }
        
        .main-container {
            width: 100%;
        }
        
        .signature-wrapper {
            display: flex;
            gap: 46px;
        }
        
        .left-section {
            text-align: center;
        }
        
        .logo-image {
            max-width: 128px;
            display: block;
            margin-bottom: 24px;
        }
        
        .card-logo {
            max-width: 130px;
            display: block;
            margin-bottom: 24px;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        
        .social-icon {
            display: inline-block;
            padding: 0;
            background-color: rgb(146, 176, 121);
            border-radius: 50%;
        }
        
        .social-icon img {
            width: 24px;
            max-width: 135px;
            display: block;
            border-radius: inherit;
        }
        
        .right-section {
            padding: 0;
            vertical-align: middle;
        }
        
        h2 {
            margin: 0;
            font-size: 18px;
            font-family: Arial;
            color: rgb(0, 0, 0);
            font-weight: 600;
            line-height: 28px;
        }
        
        .job-title {
            margin: 0;
            color: rgb(0, 0, 0);
            font-size: 14px;
            line-height: 22px;
        }
        
        .company-name {
            margin: 0;
            font-weight: 500;
            color: rgb(0, 0, 0);
            font-size: 14px;
            line-height: 22px;
        }
        
        .divider {
            width: 100%;
            height: 1px;
            border-bottom: 1px solid rgb(146, 176, 121);
            margin: 24px 0;
        }
        
        .contact-info {
            margin-top: 24px;
        }
        
        .contact-row {
            display: flex;
            align-items: center;
            height: 28px;
            margin-bottom: 0;
        }
        
        .contact-icon {
            width: 26px;
            display: inline-block;
            margin-right: 8px;
        }
        
        .contact-icon img {
            width: 18px;
            display: block;
            background-color: rgb(146, 176, 121);
        }
        
        .contact-link {
            text-decoration: none;
            color: rgb(0, 0, 0);
            font-size: 14px;
        }
        
        .contact-text {
            font-size: 14px;
            color: rgb(0, 0, 0);
        }
    </style>
</head>
<body>
    <table cellpadding="0" cellspacing="0" border="0" class="main-container">
        <tr>
            <td>
                <table cellpadding="0" cellspacing="0" border="0" class="main-container">
                    <tr>
                        <td style="vertical-align: top;">
                            <!-- LEFT SECTION - LOGOS AND SOCIAL -->
                            <table cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="text-align: center;">
                                        <img 
                                            src="https://raw.githubusercontent.com/egslab-marketing/branding/refs/heads/main/ALE%20PERSONAL%20BRAND%20OFFICIAL.jpeg" 
                                            role="presentation" 
                                            width="130" 
                                            class="logo-image"
                                            alt="Personal Brand Logo"
                                        >
                                    </td>
                                </tr>
                                <tr>
                                    <td height="24"></td>
                                </tr>
                                <tr>
                                    <td style="text-align: center;">
                                        <img 
                                            src="https://raw.githubusercontent.com/egslab-marketing/branding/refs/heads/main/CARD%20LOGO%20ANGOLI%20ARROTONDATI.png" 
                                            role="presentation" 
                                            width="130" 
                                            class="card-logo"
                                            alt="egslab Card Logo"
                                        >
                                    </td>
                                </tr>
                                <tr>
                                    <td height="24"></td>
                                </tr>
                                <tr>
                                    <td style="text-align: center;">
                                        <div class="social-icons">
                                            <a 
                                                href="https://www.linkedin.com/in/ale-alessandrini/" 
                                                class="social-icon"
                                            >
                                                <img 
                                                    src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/linkedin-icon-dark-2x.png" 
                                                    alt="LinkedIn"
                                                    loading="lazy"
                                                >
                                            </a>
                                            <span style="display: inline-block; width: 5px;"></span>
                                            <a 
                                                href="https://www.instagram.com/egslab/" 
                                                class="social-icon"
                                            >
                                                <img 
                                                    src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/instagram-icon-dark-2x.png" 
                                                    alt="Instagram"
                                                    loading="lazy"
                                                >
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                        
                        <!-- SPACER -->
                        <td width="46"></td>
                        
                        <!-- RIGHT SECTION - CONTACT INFO -->
                        <td style="padding: 0; vertical-align: middle;">
                            <!-- NAME AND TITLE -->
                            <h2>
                                <span>Alessandrini</span>
                                <span>&nbsp;</span>
                                <span>Alessio</span>
                            </h2>
                            
                            <p class="job-title">
                                <span>IT &amp; Web Specialist</span>
                            </p>
                            
                            <div class="company-name">
                                <span>egslab.</span>
                            </div>
                            
                            <!-- DIVIDER -->
                            <div class="divider"></div>
                            
                            <!-- CONTACT INFORMATION -->
                            <table cellpadding="0" cellspacing="0" border="0" class="contact-info">
                                <!-- PHONE -->
                                <tr class="contact-row">
                                    <td class="contact-icon">
                                        <img 
                                            src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/phone-icon-dark-2x.png" 
                                            alt="Phone"
                                        >
                                    </td>
                                    <td style="padding: 0; color: rgb(0, 0, 0);">
                                        <a href="tel:+39 388 445 7740" class="contact-link">
                                            <span>+39 388 445 7740</span>
                                        </a>
                                    </td>
                                </tr>
                                
                                <!-- EMAIL -->
                                <tr class="contact-row">
                                    <td class="contact-icon">
                                        <img 
                                            src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/email-icon-dark-2x.png" 
                                            alt="Email"
                                        >
                                    </td>
                                    <td style="padding: 0; color: rgb(0, 0, 0);">
                                        <a href="mailto:alessio.alessandrini@egslab.it" class="contact-link">
                                            <span>alessio.alessandrini@egslab.it</span>
                                        </a>
                                    </td>
                                </tr>
                                
                                <!-- WEBSITE -->
                                <tr class="contact-row">
                                    <td class="contact-icon">
                                        <img 
                                            src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/link-icon-dark-2x.png" 
                                            alt="Website"
                                        >
                                    </td>
                                    <td style="padding: 0; color: rgb(0, 0, 0);">
                                        <a href="//linktr.ee/egslab" class="contact-link">
                                            <span>linktr.ee/egslab</span>
                                        </a>
                                    </td>
                                </tr>
                                
                                <!-- ADDRESS -->
                                <tr class="contact-row">
                                    <td class="contact-icon">
                                        <img 
                                            src="https://cdn2.hubspot.net/hubfs/53/tools/email-signature-generator/icons/address-icon-dark-2x.png" 
                                            alt="Address"
                                        >
                                    </td>
                                    <td style="padding: 0; color: rgb(0, 0, 0);">
                                        <span class="contact-text">Genova (Italia)</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
